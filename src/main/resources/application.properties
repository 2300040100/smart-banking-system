# ===============================
# APPLICATION
# ===============================
spring.application.name=smart-banking-system
server.port=8080


# ===============================
# DATABASE - PostgreSQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/banking_db?TimeZone=Asia/Kolkata
spring.datasource.username=banking_user
spring.datasource.password=banking_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# REDIS
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ===============================
# LOGGING
# ===============================
logging.level.com.banking=DEBUG
logging.level.org.hibernate.SQL=DEBUG